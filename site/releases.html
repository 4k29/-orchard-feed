<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#0b0b0a">
    <title>OS — Orchard</title>
    <meta name="description" content="Apple OSの配信情報。">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <style>
      .release-platform {
        text-transform: none;
        letter-spacing: .06em;
      }
      .release-badge {
        font-weight: 600;
      }
      .release-badge.developer-beta {
        color: #f2b36f;
        border-color: rgba(242, 179, 111, .42);
        background: rgba(242, 179, 111, .09);
      }
      .release-badge.public-beta {
        color: #7db7f4;
        border-color: rgba(125, 183, 244, .42);
        background: rgba(125, 183, 244, .09);
      }
      .release-badge.rc {
        color: #c5a0f5;
        border-color: rgba(197, 160, 245, .42);
        background: rgba(197, 160, 245, .09);
      }
      .release-badge.stable {
        color: #7bc995;
        border-color: rgba(123, 201, 149, .42);
        background: rgba(123, 201, 149, .09);
      }
    </style>
    <script src="./releases.js" defer></script>
  </head>
  <body>
    <main class="site-shell">
      <header class="site-header">
        <a class="wordmark" href="./">Orchard</a>
        <nav class="site-nav">
          <a href="./">ニュース</a>
          <a class="active" href="./releases.html">OS</a>
          <a href="./products.html">製品</a>
        </nav>
      </header>

      <section class="intro">
        <p class="eyebrow">OS</p>
        <h1>OS</h1>
      </section>

      <section>
        <div class="database-heading">
          <div>
            <p class="section-label">Releases</p>
            <p class="sync-status" id="release-status">読み込んでいます…</p>
          </div>
          <label class="search-field">
            <span class="sr-only">検索</span>
            <input id="release-search" type="search" placeholder="検索">
          </label>
        </div>
        <div class="release-filter" id="release-filter"></div>
        <div class="release-list" id="release-list"></div>
      </section>

      <footer class="site-footer">
        <p>Orchard</p>
      </footer>
    </main>
  </body>
</html>
