<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0a" />
    <title>OS - Orchard</title>
    <meta name="description" content="Apple OSの配信情報。" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./manual-sync.css?v=20260723-3" />
    <style>
      .release-platform {
        text-transform: none;
        letter-spacing: .06em;
      }
      .release-badge {
        font-weight: 600;
      }
      .release-badge.developer-beta,
      .release-badge.public-beta,
      .release-badge.beta {
        color: #f2b36f;
        border-color: rgba(242, 179, 111, .42);
        background: rgba(242, 179, 111, .09);
      }
      .release-badge.rc {
        color: #c5a0f5;
        border-color: rgba(197, 160, 245, .42);
        background: rgba(197, 160, 245, .09);
      }
      .release-badge.stable {
        color: #7bc995;
        border-color: rgba(123, 201, 149, .42);
        background: rgba(123, 201, 149, .09);
      }
    </style>
    <script src="./releases.js?v=5adc279" defer></script>
    <script src="./os-ui.js?v=f20ed85" defer></script>
    <script src="./os-manual-sync.js?v=2573851" defer></script>
  </head>
  <body>
    <main class="site-shell">
      <header class="site-header" aria-label="サイトヘッダー">
        <a class="wordmark" href="#top" aria-label="Orchard ホーム">Orchard</a>
        <nav class="site-nav" aria-label="メインメニュー"><a href="./">News</a><a class="active" href="./releases.html">OS</a><a href="./products.html">Product</a></nav>
      </header>

      <section class="intro" id="top">
        <p class="eyebrow">Apple OS</p>
        <h1>OSのアップデートを、<br class="mobile-break" />まとめて。</h1>
      </section>

      <section aria-labelledby="release-title">
        <div class="database-heading feed-heading">
          <div>
            <p class="section-label" id="release-title">Releases</p>
            <p class="sync-status" id="release-status">読み込んでいます…</p>
          </div>
          <div class="feed-tools">
            <label class="search-field">
              <span class="sr-only">OSを検索</span>
              <svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="6.5"></circle>
                <path d="m16 16 4 4"></path>
              </svg>
              <input id="release-search" type="search" inputmode="search" placeholder="検索" autocomplete="off" />
              <button class="search-clear" id="release-search-clear" type="button" aria-label="検索をクリア" hidden>
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="m8 8 8 8M16 8l-8 8"></path>
                </svg>
              </button>
            </label>
            <button class="manual-sync" id="os-manual-sync" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M19 8a7.5 7.5 0 1 0 .3 7.5"></path>
                <path d="M19 3v5h-5"></path>
              </svg>
              <span id="os-manual-sync-label">更新</span>
            </button>
          </div>
        </div>
        <p class="manual-sync-message" id="os-manual-sync-status" aria-live="polite" hidden></p>
        <div class="release-filter" id="release-filter"></div>
        <div class="release-list" id="release-list" aria-live="polite"></div>
      </section>

      <footer class="site-footer">
        <p>Orchard</p>
      </footer>
    </main>

    <a class="back-to-top" href="#top" aria-label="ページ上部へ">↑</a>

    <dialog class="token-dialog" id="os-token-dialog">
      <form class="token-form" method="dialog">
        <p class="token-eyebrow">GitHub authentication</p>
        <h2>手動取得を有効にする</h2>
        <p class="token-description">GitHubトークンを入力してください。この端末内だけに保存されます。</p>
        <label class="token-field">
          <span>Token</span>
          <input
            id="os-github-token"
            type="password"
            placeholder="github_pat_…"
            autocomplete="off"
            autocapitalize="none"
            spellcheck="false"
            required
          />
        </label>
        <p class="token-hint">このリポジトリのActions権限だけを付けてください。</p>
        <div class="token-actions">
          <button class="token-cancel" type="submit" value="cancel" formnovalidate>キャンセル</button>
          <button class="token-save" type="submit" value="save">保存して取得</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
