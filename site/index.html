<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0a" />
    <title>Orchard</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./manual-sync.css?v=20260723-2" />
    <script src="./app.js" defer></script>
    <script src="./manual-sync.js" defer></script>
  </head>
  <body>
    <main class="site-shell">
      <header class="site-header" aria-label="サイトヘッダー">
        <a class="wordmark" href="#top" aria-label="Orchard ホーム">Orchard</a>
        <nav class="site-nav" aria-label="メインメニュー"><a class="active" href="./">ニュース</a><a href="./releases.html">OS</a><a href="./products.html">製品</a></nav>
      </header>

      <section class="intro" id="top">
        <p class="eyebrow">Apple news</p>
        <h1>Appleのニュースを、<br class="mobile-break" />まとめて。</h1>
        <div class="intro-status" aria-label="監視中の配信元">
          <span class="status-dot" aria-hidden="true"></span>
          <span>5 feeds</span>
          <span style="margin-left: 8px; color: var(--quiet); font-size: 10px; font-weight: 400; letter-spacing: 0; text-transform: none;">要約と原文リンク</span>
        </div>
      </section>

      <section class="feed" aria-labelledby="feed-title">
        <div class="feed-heading">
          <div>
            <p class="section-label" id="feed-title">最新</p>
            <p class="sync-status" id="sync-status">最終確認を取得しています…</p>
          </div>
          <div class="feed-tools">
            <label class="search-field">
              <span class="sr-only">記事を検索</span>
              <svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="6.5"></circle>
                <path d="m16 16 4 4"></path>
              </svg>
              <input id="search" type="search" inputmode="search" placeholder="検索" autocomplete="off" />
              <button class="search-clear" id="search-clear" type="button" aria-label="検索をクリア" hidden>
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="m8 8 8 8M16 8l-8 8"></path>
                </svg>
              </button>
            </label>
            <button class="manual-sync" id="manual-sync" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M19 8a7.5 7.5 0 1 0 .3 7.5"></path>
                <path d="M19 3v5h-5"></path>
              </svg>
              <span id="manual-sync-label">更新</span>
            </button>
          </div>
        </div>
        <p class="manual-sync-message" id="manual-sync-status" aria-live="polite" hidden></p>

        <div class="article-list" id="article-list" aria-live="polite" aria-busy="true">
          <div class="loading-state">記事を読み込んでいます…</div>
        </div>
      </section>
    </main>

    <dialog class="token-dialog" id="token-dialog">
      <form class="token-form" method="dialog">
        <p class="token-eyebrow">GitHub authentication</p>
        <h2>手動取得を有効にする</h2>
        <p class="token-description">GitHubトークンを入力してください。この端末内だけに保存されます。</p>
        <label class="token-field">
          <span>Token</span>
          <input
            id="github-token"
            type="password"
            placeholder="github_pat_…"
            autocomplete="off"
            autocapitalize="none"
            spellcheck="false"
            required
          />
        </label>
        <p class="token-hint">このリポジトリのActions権限だけを付けてください。</p>
        <div class="token-actions">
          <button class="token-cancel" type="submit" value="cancel" formnovalidate>キャンセル</button>
          <button class="token-save" type="submit" value="save">保存して取得</button>
        </div>
      </form>
    </dialog>

    <template id="article-template">
      <article class="article-row">
        <div class="source-mark" aria-hidden="true"><span></span></div>
        <a class="article-link" target="_blank" rel="noopener noreferrer">
          <div class="article-meta">
            <span class="article-source"></span>
            <span aria-hidden="true">·</span>
            <time></time>
          </div>
          <h2></h2>
          <p class="article-summary"></p>
          <div class="article-footer">
            <span class="read-link">原文を読む&nbsp;↗</span>
          </div>
        </a>
        <a class="article-image-link" target="_blank" rel="noopener noreferrer" tabindex="-1" aria-hidden="true" hidden>
          <img class="article-image" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer" />
        </a>
      </article>
    </template>
  </body>
</html>
