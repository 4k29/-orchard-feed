<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Orchard" />
    <meta
      name="description"
      content="Apple関連のニュースを日本語で確認するための個人用フィード。"
    />
    <meta property="og:title" content="Orchard" />
    <meta
      property="og:description"
      content="Apple関連の新着記事を日本語でまとめています。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://4k29.github.io/-orchard-feed/" />
    <meta name="twitter:card" content="summary" />
    <title>Orchard</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="site-shell">
      <header class="site-header" aria-label="サイトヘッダー">
        <a class="wordmark" href="#top" aria-label="Orchard ホーム">Orchard</a>
        <div class="header-status" aria-label="監視中の配信元">
          <span class="status-dot" aria-hidden="true"></span>
          4 feeds
        </div>
      </header>

      <section class="intro" id="top">
        <p class="eyebrow">Apple news</p>
        <h1>Appleのニュースを、<br class="mobile-break" />まとめて。</h1>
      </section>

      <section class="feed" aria-labelledby="feed-title">
        <div class="feed-heading">
          <div>
            <p class="section-label" id="feed-title">最新</p>
            <p class="sync-status" id="sync-status">記事を読み込んでいます…</p>
          </div>
          <label class="search-field">
            <span class="sr-only">記事を検索</span>
            <svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="6.5"></circle>
              <path d="m16 16 4 4"></path>
            </svg>
            <input id="search" type="search" inputmode="search" placeholder="検索" autocomplete="off" />
            <button class="search-clear" id="search-clear" type="button" aria-label="検索をクリア" hidden>
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="m8 8 8 8M16 8l-8 8"></path>
              </svg>
            </button>
          </label>
        </div>

        <div class="article-list" id="article-list" aria-live="polite" aria-busy="true">
          <div class="loading-state">記事を読み込んでいます…</div>
        </div>
      </section>

      <footer class="site-footer">
        <p>Orchardは各記事の要約と原文へのリンクを掲載しています。</p>
      </footer>
    </main>

    <template id="article-template">
      <article class="article-row">
        <div class="source-mark" aria-hidden="true"><span></span></div>
        <a class="article-link" target="_blank" rel="noopener noreferrer">
          <div class="article-meta">
            <span class="article-source"></span>
            <span aria-hidden="true">·</span>
            <time></time>
          </div>
          <h2></h2>
          <p class="article-summary"></p>
          <div class="article-footer">
            <span class="read-link">原文を読む&nbsp;↗</span>
          </div>
        </a>
        <a class="article-image-link" target="_blank" rel="noopener noreferrer" tabindex="-1" aria-hidden="true" hidden>
          <img class="article-image" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer" />
        </a>
      </article>
    </template>
  </body>
</html>
