<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0b0a" />
    <meta name="description" content="歴代Apple製品の発売日、チップ、カラー、ストレージ、モデル番号を探せる製品データベース。" />
    <title>製品データ — Orchard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍎</text></svg>" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./products.js" defer></script>
  </head>
  <body>
    <main class="site-shell">
      <header class="site-header" aria-label="サイトヘッダー">
        <a class="wordmark" href="./">Orchard</a>
        <nav class="site-nav" aria-label="メインメニュー">
          <a href="./">ニュース</a>
          <a class="active" href="./products.html" aria-current="page">製品データ</a>
        </nav>
      </header>

      <section class="intro product-intro">
        <p class="eyebrow">Apple product archive</p>
        <h1>歴代Apple製品を、<br class="mobile-break" />ひとつの場所に。</h1>
        <p class="intro-copy">発売日、チップ、カラー、ストレージ、モデル番号などを横断して探せます。</p>
      </section>

      <section class="product-database" aria-labelledby="product-title">
        <div class="database-heading">
          <div>
            <p class="section-label" id="product-title">Products</p>
            <p class="sync-status" id="product-status">製品データを読み込んでいます…</p>
          </div>
          <label class="search-field product-search">
            <span class="sr-only">製品を検索</span>
            <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4 4"></path></svg>
            <input id="product-search" type="search" inputmode="search" placeholder="製品名、チップ、型番で検索" autocomplete="off" />
          </label>
        </div>

        <div class="family-filter" id="family-filter" aria-label="製品の種類"></div>
        <div class="product-grid" id="product-grid" aria-live="polite" aria-busy="true">
          <div class="loading-state">Loading products…</div>
        </div>
        <button class="load-more" id="load-more" type="button" hidden>さらに表示</button>
      </section>

      <footer class="site-footer product-footer">
        <p>製品情報: <a href="https://appledb.dev/" target="_blank" rel="noopener noreferrer">AppleDB</a>（MIT License）</p>
        <p>価格など未収録の項目は、確認できたものから追加します。</p>
      </footer>
    </main>

    <template id="product-template">
      <article class="product-card">
        <div class="product-card-head">
          <div><p class="product-family"></p><h2></h2></div>
          <time class="product-year"></time>
        </div>
        <dl class="product-facts"></dl>
        <div class="color-list" aria-label="カラー"></div>
        <details class="product-details">
          <summary>モデル情報</summary>
          <dl></dl>
        </details>
      </article>
    </template>
  </body>
</html>
