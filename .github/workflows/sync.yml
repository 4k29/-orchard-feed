name: Appleニュースを更新
run-name: ${{ github.event_name == 'schedule' && 'RSS自動取得' || inputs.trigger_source == 'fallback' && 'RSS自動補完' || 'RSS手動取得' }}

on:
  schedule:
    - cron: "5,15,25,35,45,55 * * * *"
      timezone: "Asia/Tokyo"
  workflow_dispatch:
    inputs:
      send_test:
        description: "Discordへテスト通知を送る"
        required: false
        type: boolean
        default: false
      trigger_source:
        description: "実行元"
        required: false
        type: choice
        options:
          - manual
          - fallback
        default: manual

permissions:
  contents: write
  models: read

concurrency:
  group: apple-news-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm test

      - name: RSSを取得・翻訳・通知
        run: npm run sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: "1305762049338642552"
          SEND_TEST_NOTIFICATION: ${{ inputs.send_test }}

      - name: 新着記事を保存
        run: |
          if git diff --quiet -- data/articles.json; then
            echo "No article changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git commit -m "Update Apple news"
          git pull --rebase origin main
          git push origin HEAD:main
