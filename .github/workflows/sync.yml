name: Sync Orchard feed

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "tests/**"
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      send_test:
        description: "Discordへテスト通知を送る"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  models: read

concurrency:
  group: orchard-feed-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm test

      - name: Fetch, translate, and notify
        run: npm run sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_TEST_NOTIFICATION: ${{ inputs.send_test }}

      - name: Save updated feed
        run: |
          if git diff --quiet -- data/articles.json; then
            echo "No feed changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git commit -m "Update Orchard feed"
          git pull --rebase origin main
          git push origin HEAD:main
