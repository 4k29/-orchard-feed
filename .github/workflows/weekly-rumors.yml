name: Build weekly Apple rumor digest

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/weekly-rumors.yml"
      - "scripts/weekly.mjs"
      - "scripts/rumors.mjs"
      - "tests/rumors.test.mjs"
      - "package.json"
      - "package-lock.json"
  schedule:
    - cron: "17 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: orchard-weekly-rumors
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm test

      - name: Build weekly digest
        run: npm run weekly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save weekly digest
        run: |
          if git diff --quiet -- data/weekly-rumors.json; then
            echo "No weekly digest changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weekly-rumors.json
          git commit -m "Update weekly Apple rumor digest"
          git pull --rebase origin main
          git push origin HEAD:main
