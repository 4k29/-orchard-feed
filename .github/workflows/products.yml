name: Sync Apple product database

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: orchard-products-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AppleDB product files
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/littlebyteorg/appledb.git /tmp/appledb
          git -C /tmp/appledb sparse-checkout set deviceFiles

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build product database
        run: npm run products -- /tmp/appledb/deviceFiles data/products.json

      - name: Save updated product database
        run: |
          if git diff --quiet -- data/products.json; then
            echo "No product changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.json
          git commit -m "Update Apple product database"
          git pull --rebase origin main
          git push origin HEAD:main
